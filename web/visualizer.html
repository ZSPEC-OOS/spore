<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPORE NLWS Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a1a; color: #00f2ff; font-family: "Courier New", monospace; overflow: hidden; }
    #canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    #ui {
      position: fixed; top: 20px; left: 20px; z-index: 10;
      width: 320px; background: rgba(10, 10, 26, 0.9);
      border: 1px solid #00f2ff; border-radius: 10px; padding: 16px;
      box-shadow: 0 0 24px rgba(0,242,255,0.2);
    }
    .stat { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; }
    .progress { margin-top: 12px; height: 6px; background: #1a1a3a; border-radius: 999px; overflow: hidden; }
    .progress > div { height: 100%; width: 0; background: linear-gradient(90deg,#00f2ff,#0066ff); transition: width .2s ease; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    input, button {
      width: 100%; background: transparent; border: 1px solid #00f2ff; color: #00f2ff;
      padding: 8px; border-radius: 6px; font-family: inherit; font-size: 12px;
    }
    button { cursor: pointer; }
    button:hover { background: #00f2ff; color: #0a0a1a; }
    #log { margin-top: 10px; max-height: 120px; overflow: auto; font-size: 11px; }
    #log div { margin-bottom: 4px; color: #8deaff; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <aside id="ui">
    <h3>🧠 SPORE NLWS</h3>
    <div class="stat"><span>Phase</span><span id="phase">Initialization</span></div>
    <div class="stat"><span>Neurons</span><span id="neurons">6</span></div>
    <div class="stat"><span>Synapses</span><span id="synapses">5</span></div>
    <div class="stat"><span>Knowledge</span><span id="knowledge">0.0 MB</span></div>
    <div class="progress"><div id="progress"></div></div>
    <div class="row"><button id="general">Learn General</button><button id="pause">Pause/Resume</button></div>
    <div class="row"><input id="topic" placeholder="topic e.g. quantum computing" /></div>
    <div class="row"><button id="specialize">Specialize Topic</button><button id="ask">Ask</button></div>
    <div id="log"></div>
  </aside>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const neurons = [];
    const synapses = [];
    let particles = [];
    let isLearning = false;
    let learningProgress = 0;

    class Neuron {
      constructor(concept, x, y, layer) {
        this.concept = concept;
        this.x = x;
        this.y = y;
        this.layer = layer;
        this.radius = 8;
        this.targetRadius = 8;
        this.phase = Math.random() * Math.PI * 2;
      }
      update() {
        this.phase += 0.02;
        this.radius += (this.targetRadius - this.radius) * 0.1;
        this.targetRadius = Math.max(8, this.targetRadius * 0.985);
        this.x += Math.sin(this.phase) * 0.15;
        this.y += Math.cos(this.phase * 0.8) * 0.15;
      }
      draw() {
        const pulse = Math.sin(this.phase) * 0.25 + 1;
        const glow = this.radius * 2.2 * pulse;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glow);
        grad.addColorStop(0, "rgba(0,242,255,0.8)");
        grad.addColorStop(1, "rgba(0,102,255,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, glow, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#00f2ff";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#fff";
        ctx.font = "10px Courier New";
        ctx.textAlign = "center";
        ctx.fillText(this.concept.slice(0, 14), this.x, this.y + this.radius + 14);
      }
      activate() {
        this.targetRadius = Math.min(24, this.targetRadius + 5);
        for (let i = 0; i < 5; i++) particles.push(new Particle(this.x, this.y));
      }
    }

    class Synapse {
      constructor(a, b) {
        this.a = a;
        this.b = b;
        this.strength = 0.1;
        this.signal = -1;
      }
      update() {
        if (this.signal >= 0) {
          this.signal += 0.03;
          if (this.signal > 1) {
            this.signal = -1;
            this.b.activate();
          }
        }
      }
      draw() {
        ctx.strokeStyle = `rgba(0,242,255,${this.strength * 0.35})`;
        ctx.lineWidth = this.strength * 2;
        ctx.beginPath();
        ctx.moveTo(this.a.x, this.a.y);
        ctx.lineTo(this.b.x, this.b.y);
        ctx.stroke();

        if (this.signal >= 0) {
          const x = this.a.x + (this.b.x - this.a.x) * this.signal;
          const y = this.a.y + (this.b.y - this.a.y) * this.signal;
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      transmit() {
        this.signal = 0;
        this.strength = Math.min(1, this.strength + 0.08);
      }
    }

    class Particle {
      constructor(x, y) {
        this.x = x; this.y = y;
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 2 + 0.5;
        this.vx = Math.cos(a) * s;
        this.vy = Math.sin(a) * s;
        this.life = 1;
      }
      update() { this.x += this.vx; this.y += this.vy; this.life -= 0.025; }
      draw() {
        ctx.fillStyle = `rgba(0,242,255,${this.life})`;
        ctx.fillRect(this.x, this.y, 2, 2);
      }
    }

    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    addEventListener("resize", resize);

    function boot() {
      resize();
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const root = new Neuron("Language", cx, cy, 0);
      neurons.push(root);
      ["Syntax", "Semantics", "Context", "Intent", "Tone"].forEach((label, i, arr) => {
        const ang = (i / arr.length) * Math.PI * 2;
        const n = new Neuron(label, cx + Math.cos(ang) * 160, cy + Math.sin(ang) * 160, 1);
        neurons.push(n);
        synapses.push(new Synapse(root, n));
      });
      render();
      syncUI();
    }

    function syncUI() {
      document.getElementById("neurons").textContent = neurons.length;
      document.getElementById("synapses").textContent = synapses.length;
      document.getElementById("knowledge").textContent = (neurons.length * 0.5).toFixed(1) + " MB";
      document.getElementById("progress").style.width = `${learningProgress}%`;
    }

    function log(message) {
      const row = document.createElement("div");
      row.textContent = `> ${message}`;
      const logEl = document.getElementById("log");
      logEl.prepend(row);
      while (logEl.children.length > 12) logEl.removeChild(logEl.lastChild);
    }

    function grow(concept, parent) {
      const ang = Math.random() * Math.PI * 2;
      const dist = 100 + Math.random() * 120;
      const n = new Neuron(concept, parent.x + Math.cos(ang) * dist, parent.y + Math.sin(ang) * dist, parent.layer + 1);
      neurons.push(n);
      synapses.push(new Synapse(parent, n));
      neurons.forEach(other => {
        if (other === n || other === parent) return;
        if (Math.hypot(other.x - n.x, other.y - n.y) < 150 && Math.random() > 0.75) {
          synapses.push(new Synapse(n, other));
        }
      });
      syncUI();
      return n;
    }

    function simulateStep() {
      const source = neurons[Math.floor(Math.random() * neurons.length)];
      source.activate();
      synapses.forEach(s => { if (s.a === source && Math.random() > 0.5) s.transmit(); });

      if (Math.random() > 0.98 && neurons.length < 180) {
        const vocab = ["Pattern", "Signal", "Reference", "Meaning", "Vector", "Node", "Context"]; 
        grow(vocab[Math.floor(Math.random() * vocab.length)] + "_" + neurons.length, source);
      }

      learningProgress = Math.min(100, learningProgress + 0.15);
      syncUI();
    }

    function render() {
      ctx.fillStyle = "rgba(10,10,26,0.22)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      synapses.forEach(s => { s.update(); s.draw(); });
      neurons.forEach(n => { n.update(); n.draw(); });

      particles = particles.filter(p => {
        p.update();
        p.draw();
        return p.life > 0;
      });

      if (isLearning && Math.random() > 0.94) simulateStep();
      requestAnimationFrame(render);
    }

    document.getElementById("general").onclick = () => {
      isLearning = true;
      document.getElementById("phase").textContent = "General Language";
      log("Starting general language acquisition");
    };

    document.getElementById("specialize").onclick = () => {
      const topic = document.getElementById("topic").value.trim();
      if (!topic) return alert("Please enter a topic first");
      isLearning = true;
      document.getElementById("phase").textContent = `Topic: ${topic}`;
      const hub = grow(topic, neurons[0]);
      hub.activate();
      log(`Specializing in topic: ${topic}`);
    };

    document.getElementById("pause").onclick = () => {
      isLearning = !isLearning;
      log(isLearning ? "Resumed learning" : "Paused learning");
    };

    document.getElementById("ask").onclick = () => {
      const q = prompt("Enter your question");
      if (!q) return;
      const terms = q.toLowerCase().split(/\s+/);
      let hits = 0;
      neurons.forEach(n => {
        if (terms.some(t => n.concept.toLowerCase().includes(t))) {
          n.activate();
          hits += 1;
        }
      });
      log(hits ? `Activated ${hits} nodes for question` : "No relevant nodes yet; continue learning");
    };

    boot();
  </script>
</body>
</html>
